[www]
user = www
group = www

listen = 9000
listen.owner = www
listen.group = www

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Catch worker output
catch_workers_output = yes
decorate_workers_output = no

; Clear environment
clear_env = no
