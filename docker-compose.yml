services:
    # PHP-FPM Application
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: uanidb-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - .:/var/www:cached
            - vendor-data:/var/www/vendor
            - node-modules:/var/www/node_modules
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - uanidb-network
        depends_on:
            - mysql
            - redis
        environment:
            - COMPOSER_MEMORY_LIMIT=-1

    # Nginx Web Server
    nginx:
        image: nginx:alpine
        container_name: uanidb-nginx
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - .:/var/www:cached
            - vendor-data:/var/www/vendor
            - node-modules:/var/www/node_modules
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - uanidb-network
        depends_on:
            - app

    # MySQL Database
    mysql:
        image: mysql:8.0
        container_name: uanidb-mysql
        restart: unless-stopped
        ports:
            - "23306:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-uanidb}
            MYSQL_USER: ${DB_USERNAME:-uanidb}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
        volumes:
            - mysql-data:/var/lib/mysql
            - ./docker/mysql/init:/docker-entrypoint-initdb.d
        networks:
            - uanidb-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Redis Cache & Queue
    redis:
        image: redis:alpine
        container_name: uanidb-redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        networks:
            - uanidb-network
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Node.js for Frontend Build (Vite)
    node:
        image: node:20-alpine
        container_name: uanidb-node
        working_dir: /var/www
        volumes:
            - .:/var/www:cached
            - node-modules:/var/www/node_modules
        ports:
            - "5173:5173"
        networks:
            - uanidb-network
        command: sh -c "npm install && npm run dev -- --host"
        profiles:
            - dev

    # Selenium Chrome for Dusk E2E Tests
    selenium:
        image: selenium/standalone-chromium:latest
        container_name: uanidb-selenium
        volumes:
            - /dev/shm:/dev/shm
        networks:
            - uanidb-network
        profiles:
            - test

    # Mailpit for Email Testing
    mailpit:
        image: axllent/mailpit
        container_name: uanidb-mailpit
        restart: unless-stopped
        ports:
            - "1025:1025"
            - "8025:8025"
        networks:
            - uanidb-network
        profiles:
            - dev

    # Queue Worker
    queue:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: uanidb-queue
        restart: unless-stopped
        user: www
        working_dir: /var/www
        volumes:
            - .:/var/www:cached
            - vendor-data:/var/www/vendor
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - uanidb-network
        depends_on:
            - app
            - mysql
            - redis
        command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
        profiles:
            - production

    # Scheduler (Cron)
    scheduler:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: uanidb-scheduler
        restart: unless-stopped
        user: www
        working_dir: /var/www
        volumes:
            - .:/var/www:cached
            - vendor-data:/var/www/vendor
            - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
        networks:
            - uanidb-network
        depends_on:
            - app
            - mysql
        command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
        profiles:
            - production

networks:
    uanidb-network:
        driver: bridge

volumes:
    mysql-data:
    redis-data:
    vendor-data:
    node-modules:
